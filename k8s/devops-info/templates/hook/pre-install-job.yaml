apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-info.fullname" . }}-pre-install"
  labels:
    {{- include "devops-info.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "{{ include "devops-info.fullname" . }}-pre-install"
    spec:
      restartPolicy: Never
      containers:
        - name: pre-install-job
          image: busybox
          command: ['sh', '-c', 'echo Pre-install migration running! && sleep 5 && echo Pre-install completed!']