apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info.fullname" . }}-headless
  labels:
    {{- include "devops-info.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: {{ include "devops-info.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}