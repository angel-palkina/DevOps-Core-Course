apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info.fullname" . }}-service
  labels:
    {{- include "devops-info.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "devops-info.name" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort | default 30080 }}