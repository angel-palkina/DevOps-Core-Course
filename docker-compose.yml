version: "3.9"

services:
  devops-info:
    build:
      context: ./app_python
      dockerfile: Dockerfile
    container_name: devops-info
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=False
      - VISITS_FILE=/data/visits
    volumes:
      - ./data:/data
    restart: unless-stopped